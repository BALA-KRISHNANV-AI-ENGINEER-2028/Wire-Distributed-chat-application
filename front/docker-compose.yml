services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:8080}
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/wire}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-refresh-secret}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:8080}
    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"

volumes:
  mongo_data:
